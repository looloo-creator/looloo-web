<div class="row">
    <div class="col-lg-12">

    </div>
    <div class="col-lg-12">
        <mat-card class="cardWithShadow">
            <mat-card-header>
                <div class="col-md-12 p-24">
                    <mat-card-title>Tours
                        <button mat-fab extended class="float-right m-b-20" [routerLink]="['/tours/addtour']">
                            <mat-icon>add</mat-icon>
                            Add New
                        </button>
                    </mat-card-title>

                </div>
            </mat-card-header>
            <mat-card-content>
                <!-- <mat-card-title>Tours</mat-card-title> -->
                <div class="table-responsive">
                    <table mat-table [dataSource]="tours" class="tour-table w-100">
                        <!-- Position Column -->
                        <ng-container matColumnDef="position">
                            <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14">
                                S.No
                            </th>
                            <td mat-cell *matCellDef="let element">
                                <div class="d-flex align-items-center">
                                    <div class="m-l-16">
                                        {{ element.position }}
                                    </div>
                                </div>
                            </td>
                        </ng-container>

                        <!-- Name Column -->
                        <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14">
                                Name
                            </th>
                            <td mat-cell *matCellDef="let element" class="mat-body-1">
                                {{ element.name }}
                            </td>
                        </ng-container>

                        <!-- Description Column -->
                        <ng-container matColumnDef="description">
                            <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14">
                                Desc
                            </th>
                            <td mat-cell *matCellDef="let element">
                                {{ element.description | titlecase }}
                            </td>
                        </ng-container>

                        <!-- Symbol Column -->
                        <ng-container matColumnDef="action">
                            <th mat-header-cell *matHeaderCellDef
                                class="f-w-600 mat-subtitle-1 f-s-14 justify-content-center d-flex">
                                <span class="m-l-16">Action</span>
                            </th>
                            <td mat-cell *matCellDef="let element" class="mat-body-1">
                                <mat-icon class="m-l-16 cursor-pointer" title="Members"
                                    [routerLink]="['/tours/addmember']"
                                    [queryParams]="{tour_id: element.tour_id}">account_box</mat-icon>
                                <mat-icon class="m-l-16 cursor-pointer" title="Edit" [routerLink]="['/tours/addtour']"
                                    [queryParams]="{tour_id: element.tour_id}">edit</mat-icon>
                                <mat-icon class="m-l-16 cursor-pointer" title="Delete"
                                    (click)="deleteTour(element.tour_id)">delete</mat-icon>
                                <div class="col-md-12 d-flex accounts">
                                    <div class="col-md-6 justify-content-center d-flex tile tile-left cursor-pointer"
                                        (click)="redirect('/tours/accounts', {tour_id: element.tour_id})"><mat-icon
                                            class="m-l-16" title="Add Transaction">account_balance</mat-icon> Add
                                        Transaction
                                    </div>
                                    <div class="col-md-6 justify-content-center d-flex tile tile-right cursor-pointer"
                                        (click)="redirect('/tours/report', {tour_id: element.tour_id})">
                                        <mat-icon class="m-l-16 cursor-pointer"
                                            title="Show Transactions">account_balance_wallet</mat-icon>
                                        Show Transactions
                                    </div>
                                </div>
                            </td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="tourColumns"></tr>
                        <tr mat-row *matRowDef="let row; columns: tourColumns"></tr>
                    </table>
                    <div class="w-100 d-flex justify-content-center" *ngIf="tours.length === 0">No records found</div>
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</div>
