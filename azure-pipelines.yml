trigger:
  branches:
    include:
      - master

resources:
- repo: self

variables:
  imageName: 'rajasekar9698/one-pay-app'

stages:
- stage: Build
  displayName: Build and Push Docker image
  jobs:
  - job: Build
    displayName: Build and Push
    pool:
      name: 'The Crown'
      demands:
        - agent.name -equals CROWN-UBUNTU
    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: $(imageName)
        command: build
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile.production'

    - task: Docker@2
      displayName: Push an image
      inputs:
        command: push
        repository: $(imageName)
        containerRegistry: 'DockerHubConnection'
